<script>
// Función para cambiar el contenido del iframe sin recargar la página
function cambiarContenido(url) {
    const iframe = document.getElementById('foot');
    if (iframe) {
        iframe.src = url;
    }
    // Cerrar submenús después de seleccionar una opción
    setTimeout(() => {
        closeAllSubmenus();
    }, 100);
}

// Funcionalidad para los submenús superpuestos
document.addEventListener('DOMContentLoaded', function() {
    // Seleccionar todos los botones que tienen submenú
    const submenuBtns = document.querySelectorAll('.submenu-btn');
    
    // Función para cerrar todos los submenús
    window.closeAllSubmenus = function() {
        document.querySelectorAll('.submenu').forEach(submenu => {
            submenu.classList.remove('show-submenu');
        });
    };
    
    // Agregar event listener a cada botón
    submenuBtns.forEach(btn => {
        btn.addEventListener('click', function(event) {
            event.stopPropagation(); // Evitar que el click cierre el menú inmediatamente
            event.preventDefault();   // Prevenir comportamiento por defecto
            
            // Obtener el submenú correspondiente (el siguiente hermano)
            const submenu = this.nextElementSibling;
            
            // Verificar si el submenú ya está abierto
            const isOpen = submenu.classList.contains('show-submenu');
            
            // Cerrar todos los submenús
            closeAllSubmenus();
            
            // Si no estaba abierto, abrir este
            if (!isOpen) {
                submenu.classList.add('show-submenu');
            }
        });
    });
    
    // Cerrar submenús cuando se hace clic en cualquier parte del documento
    document.addEventListener('click', function(event) {
        // Verificar si el clic no fue dentro de un botón de submenú o su menú
        let isClickInside = false;
        
        // Verificar si el clic fue en un botón o dentro de un submenú
        if (event.target.closest('.submenu-btn') || event.target.closest('.submenu')) {
            isClickInside = true;
        }
        
        if (!isClickInside) {
            closeAllSubmenus();
        }
    });
    
    // Prevenir que los enlaces dentro del submenú cierren el menú al hacer clic
    document.querySelectorAll('.submenu a').forEach(link => {
        link.addEventListener('click', function(event) {
            // No cerrar inmediatamente para permitir que el enlace funcione
            setTimeout(() => {
                closeAllSubmenus();
            }, 150);
        });
    });
});
</script>
